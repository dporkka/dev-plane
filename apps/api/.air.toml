# Air -- Live reload configuration for Go API
# https://github.com/air-verse/air
#
# Usage: cd apps/api && air -c .air.toml
# Or:    make dev-api (auto-detects Air)

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Binary name
  bin = "./tmp/api"

  # Build command
  cmd = "go build -o ./tmp/api ./cmd/api/main.go"

  # Delay before triggering rebuild
  delay = 1000

  # Exclude directories from watching
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "gen"]

  # Exclude files from watching
  exclude_file = ["*_test.go", "*.md"]

  # Exclude specific regex patterns
  exclude_regex = ["_test.go"]

  # Include file extensions to watch
  include_ext = ["go", "tpl", "tmpl", "html"]

  # Ignore the build output directory
  exclude_unchanged = true

  # Follow symlinks
  follow_symlink = true

  # Full build on change
  full_bin = ""

  # Send interrupt signal before killing
  kill_delay = "0s"

  # Log build errors
  log = "build-errors.log"

  # Show compilation errors in browser
  send_interrupt = false

  # Stop running old binary before building
  stop_on_error = true

[color]
  # Customize colors
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  # Show build time
  time = true

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[screen]
  # Clear screen on rebuild
  clear_on_rebuild = true
  # Keep scrollback
  keep_scroll = true
